print_freq: 100
output_dir: './logs'
checkpoint_freq: 12
keep_the_latest: 10   # save checkpoint{epoch}.pth every epoch, keep only the latest 10 (0 = old behavior)


sync_bn: True
find_unused_parameters: False


use_amp: False
scaler:
  type: GradScaler
  enabled: True


use_ema: False
ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 1000
