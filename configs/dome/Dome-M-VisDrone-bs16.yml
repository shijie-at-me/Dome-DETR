# Dome-M-VisDrone with global batch size 16 (instead of 8).
# Per the linear LR scaling rule, ALL learning rates are doubled vs the bs=8 config.
# Use for faster sweeps; re-validate the winning variant at the canonical bs=8 config
# before finalizing paper numbers. Verify the effective lr in train.py's "cfg:" print.
__include__: ['./Dome-M-VisDrone.yml']

train_dataloader:
  total_batch_size: 16

val_dataloader:
  total_batch_size: 32

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.00004
    -
      params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.00004
      weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.
  lr: 0.0004
  betas: [0.9, 0.999]
  weight_decay: 0.000065
